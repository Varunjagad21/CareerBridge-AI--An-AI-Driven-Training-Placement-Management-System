<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Login/Register</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h1 { text-align: center; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover { background-color: #0056b3; }

        .toggle-link {
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
            color: #007bff;
        }

        .error-message { color: red; text-align: center; margin-top: 10px; }
        .success-message { color: green; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 id="form-title">Company Login</h1>
        <form id="company-form">
            <div class="register-fields" style="display: none;">
                <input type="text" id="username" placeholder="Full Name">
            </div>
            <input type="email" id="useremail" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="form-btn">Login</button>
        </form>
        <div class="toggle-link" id="toggle-link">Don't have an account? Register here.</div>
        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>
    </div>

    <script>
        let isLogin = true;

        const formTitle   = document.getElementById('form-title');
        const toggleLink  = document.getElementById('toggle-link');
        const registerFields = document.querySelector('.register-fields');
        const formBtn     = document.getElementById('form-btn');
        const errorMsg    = document.getElementById('error-message');
        const successMsg  = document.getElementById('success-message');

        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.textContent    = isLogin ? 'Company Login' : 'Company Register';
            toggleLink.textContent   = isLogin ? "Don't have an account? Register here." : "Already have an account? Login here.";
            registerFields.style.display = isLogin ? 'none' : 'block';
            formBtn.textContent      = isLogin ? 'Login' : 'Register';
            errorMsg.textContent     = '';
            successMsg.textContent   = '';
        });

        document.getElementById('company-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent   = '';
            successMsg.textContent = '';
            formBtn.disabled = true;
            formBtn.textContent = isLogin ? 'Logging in…' : 'Registering…';

            const email    = document.getElementById('useremail').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                if (isLogin) {
                    // ── LOGIN ──
                    const res  = await fetch('http://localhost:5000/api/auth/login', {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body:    JSON.stringify({ email, password })
                    });
                    const data = await res.json();

                    if (data.success) {
                        // ✅ Save user info to localStorage
                        localStorage.setItem('token',     data.token);
                        localStorage.setItem('userId',    data.user.id);
                        localStorage.setItem('userName',  data.user.name);
                        localStorage.setItem('userEmail', data.user.email);
                        localStorage.setItem('userRole',  data.user.role);

                        successMsg.textContent = `Welcome back, ${data.user.name}! Redirecting…`;

                        // Redirect based on role
                        setTimeout(() => {
                            if (data.user.role === 'admin') {
                                window.location.href = 'addashboard.html';
                            } else {
                                window.location.href = 'company-dashboard.html';
                            }
                        }, 1000);

                    } else {
                        errorMsg.textContent = data.message || 'Login failed.';
                    }

                } else {
                    // ── REGISTER ──
                    const name = document.getElementById('username').value.trim();
                    if (!name) { errorMsg.textContent = 'Please enter your name.'; formBtn.disabled = false; formBtn.textContent = 'Register'; return; }

                    const res  = await fetch('http://localhost:5000/api/auth/register', {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body:    JSON.stringify({ name, email, password, role: 'company' })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        successMsg.textContent = 'Registered successfully! Please login.';
                        // Switch to login mode
                        setTimeout(() => {
                            isLogin = true;
                            formTitle.textContent        = 'Company Login';
                            toggleLink.textContent       = "Don't have an account? Register here.";
                            registerFields.style.display = 'none';
                            formBtn.textContent          = 'Login';
                        }, 1200);
                    } else {
                        errorMsg.textContent = data.message || 'Registration failed.';
                    }
                }

            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server. Make sure backend is running.';
            } finally {
                formBtn.disabled    = false;
                formBtn.textContent = isLogin ? 'Login' : 'Register';
            }
        });
    </script>
</body>
</html>
