<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login/Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .form-container { background-color: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; }
        h1 { text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #45a049; }
        .toggle-link { text-align: center; margin-top: 10px; cursor: pointer; color: #4CAF50; }
        .error-message { color: red; text-align: center; margin-top: 10px; }
        .success-message { color: green; text-align: center; margin-top: 10px; }
        .register-fields { display: none; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #4CAF50; text-decoration: none; font-size: 16px; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 id="form-title">Admin Login</h1>
        <form id="admin-form">
            <div class="register-fields" id="reg-fields">
                <input type="text" id="reg-name" placeholder="Full Name">
            </div>
            <input type="email" id="username" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="form-btn">Login</button>
        </form>
        <div class="toggle-link" id="toggle-link">Don't have an account? Register here.</div>
        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>
        <div class="back-link"><a href="index.html">Back to Home</a></div>
    </div>

    <script>
        let isLogin = true;

        const formTitle      = document.getElementById('form-title');
        const toggleLink     = document.getElementById('toggle-link');
        const regFields      = document.getElementById('reg-fields');
        const formBtn        = document.getElementById('form-btn');
        const errorMsg       = document.getElementById('error-message');
        const successMsg     = document.getElementById('success-message');

        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.textContent  = isLogin ? 'Admin Login' : 'Admin Register';
            toggleLink.textContent = isLogin ? "Don't have an account? Register here." : "Already have an account? Login here.";
            regFields.style.display = isLogin ? 'none' : 'block';
            formBtn.textContent    = isLogin ? 'Login' : 'Register';
            errorMsg.textContent   = '';
            successMsg.textContent = '';
        });

        document.getElementById('admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent   = '';
            successMsg.textContent = '';
            formBtn.disabled = true;
            formBtn.textContent = isLogin ? 'Logging in…' : 'Registering…';

            const email    = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            try {
                if (isLogin) {
                    const res  = await fetch('http://localhost:5000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();

                    if (data.success) {
                        // ✅ Save token + user info
                        localStorage.setItem('token',     data.token);
                        localStorage.setItem('userId',    data.user.id);
                        localStorage.setItem('userName',  data.user.name);
                        localStorage.setItem('userEmail', data.user.email);
                        localStorage.setItem('userRole',  data.user.role);

                        successMsg.textContent = `Welcome, ${data.user.name}! Redirecting…`;
                        setTimeout(() => {
                            window.location.href = 'addashboard.html';
                        }, 1000);
                    } else {
                        errorMsg.textContent = data.message || 'Login failed.';
                    }

                } else {
                    const name = document.getElementById('reg-name').value.trim();
                    if (!name) { errorMsg.textContent = 'Please enter your name.'; formBtn.disabled = false; formBtn.textContent = 'Register'; return; }

                    const res  = await fetch('http://localhost:5000/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password, role: 'admin' })
                    });
                    const data = await res.json();

                    if (res.ok) {
                        successMsg.textContent = 'Registered! Please login.';
                        setTimeout(() => {
                            isLogin = true;
                            formTitle.textContent   = 'Admin Login';
                            toggleLink.textContent  = "Don't have an account? Register here.";
                            regFields.style.display = 'none';
                            formBtn.textContent     = 'Login';
                        }, 1200);
                    } else {
                        errorMsg.textContent = data.message || 'Registration failed.';
                    }
                }
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server.';
            } finally {
                formBtn.disabled    = false;
                formBtn.textContent = isLogin ? 'Login' : 'Register';
            }
        });
    </script>
</body>
</html>
